name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# Cancel previous runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Quality Gate ───────────────────────────────────
  quality:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        id: format
        run: |
          RESULT=$(dart format --output=none --set-exit-if-changed . 2>&1) || true
          if [ $? -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=$RESULT" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run analysis
        id: analyze
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee analysis.txt
          echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run unit tests
        id: unit_tests
        run: |
          flutter test test/unit/ --reporter expanded 2>&1 | tee unit_tests.txt
          echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run widget tests
        id: widget_tests
        run: |
          flutter test test/widget/ --reporter expanded 2>&1 | tee widget_tests.txt
          echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post PR comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let analysisResult = '✅ Passed';
            let unitTestResult = '✅ Passed';
            let widgetTestResult = '✅ Passed';
            let formatResult = '✅ Passed';

            try {
              if ('${{ steps.format.outputs.status }}' === 'failed') formatResult = '❌ Failed';
              if ('${{ steps.analyze.outputs.status }}' !== '0') analysisResult = '❌ Failed';
              if ('${{ steps.unit_tests.outputs.status }}' !== '0') unitTestResult = '❌ Failed';
              if ('${{ steps.widget_tests.outputs.status }}' !== '0') widgetTestResult = '❌ Failed';
            } catch (e) {}

            const body = `## 🔍 PR Quality Report

            | Check | Status |
            |-------|--------|
            | 🎨 Formatting | ${formatResult} |
            | 🔍 Analysis | ${analysisResult} |
            | 🧪 Unit Tests | ${unitTestResult} |
            | 🧩 Widget Tests | ${widgetTestResult} |

            ---
            *Generated by Price Pilot CI*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.body.includes('PR Quality Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # ─── PR Size Labeler ────────────────────────────────
  label:
    name: 🏷️ Size Label
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate diff size
        id: diff
        run: |
          ADDITIONS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{sum += $1} END {print sum+0}')
          DELETIONS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{sum += $2} END {print sum+0}')
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if [ $TOTAL -lt 10 ]; then
            echo "label=size/XS" >> $GITHUB_OUTPUT
          elif [ $TOTAL -lt 50 ]; then
            echo "label=size/S" >> $GITHUB_OUTPUT
          elif [ $TOTAL -lt 200 ]; then
            echo "label=size/M" >> $GITHUB_OUTPUT
          elif [ $TOTAL -lt 500 ]; then
            echo "label=size/L" >> $GITHUB_OUTPUT
          else
            echo "label=size/XL" >> $GITHUB_OUTPUT
          fi

      - name: Apply size label
        uses: actions/github-script@v7
        with:
          script: |
            const label = '${{ steps.diff.outputs.label }}';
            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];

            // Remove existing size labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const l of currentLabels) {
              if (sizeLabels.includes(l.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            // Add new size label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } catch (e) {
              // Label might not exist yet, create it
              const colors = {
                'size/XS': '3CBF00',
                'size/S': '5D9801',
                'size/M': '7F7203',
                'size/L': 'A14C05',
                'size/XL': 'C32607',
              };
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: colors[label] || '666666',
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }
