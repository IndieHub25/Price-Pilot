name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Format Check ───────────────────────────────────
  format:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
          cache: true

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  # ─── Static Analysis ────────────────────────────────
  analyze:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest
    needs: format
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analysis
        run: flutter analyze --no-fatal-infos

  # ─── Unit & Widget Tests ────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: |
          flutter test test/unit/ --coverage --reporter expanded

      - name: Run widget tests
        run: |
          flutter test test/widget/ --reporter expanded

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ─── Build Validation ───────────────────────────────
  build:
    name: 🔨 Build Check
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug
